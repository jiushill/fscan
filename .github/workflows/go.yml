name: Build fscan (Obfuscated)

on:
  workflow_dispatch:

env:
  GO_VERSION: "1.24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            bin_ext: .exe
          - goos: linux
            goarch: amd64
            bin_ext: ""
          - goos: linux
            goarch: arm64
            bin_ext: ""
          - goos: darwin
            goarch: amd64
            bin_ext: ""
          - goos: darwin
            goarch: arm64
            bin_ext: ""

    defaults:
      run:
        working-directory: fscan

    steps:
      - name: Checkout fscan source
        uses: actions/checkout@v4
        with:
          repository: shadow1ng/fscan
          ref: main
          path: fscan

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: fscan/go.sum

      - name: Download Go modules
        run: go mod download

      - name: Patch source — strip fscan fingerprints
        shell: bash
        run: |
          python3 << 'PYEOF'
          import os, sys

          def apply_patches(fname, replacements):
              with open(fname, "r", encoding="utf-8", newline="") as f:
                  content = f.read()
              orig = content
              for old, new in replacements:
                  if old in content:
                      content = content.replace(old, new)
                      continue
                  old_crlf = old.replace('\n', '\r\n')
                  new_crlf = new.replace('\n', '\r\n')
                  if old_crlf in content:
                      content = content.replace(old_crlf, new_crlf)
                      continue
                  print(f"WARNING: pattern not found in {fname}")
                  print(f"  {repr(old[:80])}")
              if content != orig:
                  with open(fname, "w", encoding="utf-8", newline="") as f:
                      f.write(content)
                  print(f"OK patched: {fname}")
              else:
                  print(f"SKIP (no change): {fname}")

          apply_patches("common/flag.go", [
              ("\t// 显示Banner\n\tBanner()",
               "\t// Banner stripped for build\n"),
          ])

          apply_patches("common/flag_config.go", [
              ('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
               'curl/7.68.0'),
          ])

          apply_patches("main_cli.go", [
              ('\t"github.com/shadow1ng/fscan/common/debug"\n', ""),
              ('\tdebug.Start()\n', ""),
              ('\tdefer debug.Stop()\n', ""),
          ])

          print("Source patching done.")
          PYEOF

      - name: Build binary (stripped)
        run: |
          mkdir -p ../output
          BIN="../output/network_tool${{ matrix.bin_ext }}"
          LDFLAGS="-s -w -X github.com/shadow1ng/fscan/common.version=1.0 -X github.com/shadow1ng/fscan/common.commit=00000000 -X github.com/shadow1ng/fscan/common.date=1970-01-01"

          CGO_ENABLED=0 GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} \
            go build -ldflags="$LDFLAGS" -trimpath -buildvcs=false \
            -o "$BIN" .

          echo "=== Binary ==="
          ls -lh "$BIN"
          file "$BIN" || true

      - name: UPX compress
        uses: crazy-max/ghaction-upx@v3
        with:
          version: latest
          files: |
            output/network_tool${{ matrix.bin_ext }}
          args: --best --lzma

      - name: Rename with platform suffix
        run: |
          mv "../output/network_tool${{ matrix.bin_ext }}" \
             "../output/network_tool-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.bin_ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: network_tool-${{ matrix.goos }}-${{ matrix.goarch }}
          path: output/network_tool-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.bin_ext }}
          if-no-files-found: error
          retention-days: 7

  summary:
    name: Build summary
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Done
        run: |
          echo "================================================="
          echo "  Build complete. Download from Artifacts."
          echo "================================================="
