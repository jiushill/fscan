name: Build fscan (Obfuscated)

on:
  workflow_dispatch:

env:
  GO_VERSION: "1.24"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: ${{ matrix.goos }}-${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: windows
            goarch: amd64
            bin_ext: .exe
          - goos: linux
            goarch: amd64
            bin_ext: ""
          - goos: linux
            goarch: arm64
            bin_ext: ""

    defaults:
      run:
        working-directory: fscan

    steps:
      - name: Checkout fscan source
        uses: actions/checkout@v4
        with:
          repository: shadow1ng/fscan
          ref: main
          path: fscan

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: fscan/go.sum

      - name: Verify Go version
        run: go version

      - name: Download Go modules
        run: go mod download

      - name: Patch source — strip fscan fingerprints
        shell: bash
        run: |
          python3 << 'PYEOF'
          import os, sys, fnmatch

          def apply_patches(fname, replacements):
              with open(fname, "r", encoding="utf-8", newline="") as f:
                  content = f.read()
              orig = content
              for old, new in replacements:
                  if old in content:
                      content = content.replace(old, new)
                      continue
                  old_crlf = old.replace('\n', '\r\n')
                  new_crlf = new.replace('\n', '\r\n')
                  if old_crlf in content:
                      content = content.replace(old_crlf, new_crlf)
                      continue
                  print(f"WARNING: pattern not found in {fname}")
                  print(f"  {repr(old[:80])}")
              if content != orig:
                  with open(fname, "w", encoding="utf-8", newline="") as f:
                      f.write(content)
                  print(f"OK patched: {fname}")
              else:
                  print(f"SKIP (no change): {fname}")

          # 0. Rename module path across entire project
          OLD_MOD = "github.com/shadow1ng/fscan"
          NEW_MOD = "github.com/net/tools"

          for root, dirs, files in os.walk("."):
              for fname in files:
                  if fname.endswith(".go") or fname == "go.mod":
                      fpath = os.path.join(root, fname)
                      with open(fpath, "r", encoding="utf-8", newline="") as f:
                          content = f.read()
                      if OLD_MOD in content:
                          content = content.replace(OLD_MOD, NEW_MOD)
                          with open(fpath, "w", encoding="utf-8", newline="") as f:
                              f.write(content)
          print(f"Module renamed: {OLD_MOD} -> {NEW_MOD}")

          # 1. Disable Banner() call (common/flag.go)
          apply_patches("common/flag.go", [
              ("\t// 显示Banner\n\tBanner()",
               "\t// Banner stripped for build\n"),
          ])

          # 2. Replace default User-Agent (common/flag_config.go)
          apply_patches("common/flag_config.go", [
              ('Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36',
               'curl/7.68.0'),
          ])

          # 3. Strip debug/pprof import (main_cli.go)
          apply_patches("main_cli.go", [
              (f'\t"{NEW_MOD}/common/debug"\n', ""),
              ('\tdebug.Start()\n', ""),
              ('\tdefer debug.Stop()\n', ""),
          ])

          # 4. Fix SA2001 empty critical section (common/state_test.go)
          apply_patches("common/state_test.go", [
              ("\tmu.Lock()\n\tmu.Unlock()",
               "\tmu.Lock()\n\t_ = mu // test mutex\n\tmu.Unlock()"),
          ])

          print("Source patching done.")
          PYEOF

      - name: Install garble (pinned version for Go 1.24)
        run: |
          go install mvdan.cc/garble@v0.14.0
          GARBLE="$(go env GOPATH)/bin/garble"
          "$GARBLE" version 2>/dev/null && echo "garble OK" || echo "garble NOT FOUND"

      - name: Build binary
        run: |
          mkdir -p ../output
          GARBLE="$(go env GOPATH)/bin/garble"
          BIN="../output/network_tool${{ matrix.bin_ext }}"
          LDFLAGS="-s -w -X github.com/net/tools/common.version=1.0 -X github.com/net/tools/common.commit=00000000 -X github.com/net/tools/common.date=1970-01-01"

          if [ -x "$GARBLE" ]; then
            echo "=== garble ==="
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
              "$GARBLE" -tiny -literals -seed=random \
              build -ldflags="$LDFLAGS" -trimpath -buildvcs=false \
              -o "$BIN" . 2>&1 || echo "GARBLE_FAILED"
          fi

          if [ ! -f "$BIN" ]; then
            echo "=== fallback go build ==="
            GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 \
              go build -ldflags="$LDFLAGS" -trimpath -buildvcs=false \
              -gcflags="all=-spectre=index" \
              -o "$BIN" .
          fi

          ls -lh "$BIN"
          file "$BIN" || true

      - name: Strip Go build ID/note sections
        shell: bash
        run: |
          set +e
          BIN="../output/network_tool${{ matrix.bin_ext }}"
          go tool buildid -w "$BIN" 2>/dev/null || true

          if [ "${{ matrix.goos }}" = "linux" ] && [ "${{ matrix.goarch }}" = "amd64" ]; then
            strip -R .note.go.buildid "$BIN" 2>/dev/null || true
            strip -R .note.gnu.build-id "$BIN" 2>/dev/null || true
          fi
          set -e

      - name: UPX compress
        uses: crazy-max/ghaction-upx@v3
        with:
          version: latest
          files: |
            output/network_tool${{ matrix.bin_ext }}
          args: --best --lzma

      - name: Rename with platform suffix
        run: |
          mv "../output/network_tool${{ matrix.bin_ext }}" \
             "../output/network_tool-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.bin_ext }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: network_tool-${{ matrix.goos }}-${{ matrix.goarch }}
          path: output/network_tool-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.bin_ext }}
          if-no-files-found: error
          retention-days: 7

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release
          pattern: network_tool-*
          merge-multiple: true

      - name: List release files
        run: ls -lh release/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: nightly
          name: "Nightly Build"
          body: |
            Automated nightly build (obfuscated).

            - Module path renamed
            - Banner / debug / UA stripped
            - garble obfuscation (-tiny -literals)
            - DWARF + symbol table stripped (-s -w)
            - trimpath + buildvcs=false
            - Go build ID removed
            - UPX packed (--best --lzma)
          prerelease: true
          make_latest: true
          files: |
            release/*
